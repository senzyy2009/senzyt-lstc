<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>TikDown Pro V2</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#0a0a0a;
color:white;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
padding:20px;
}

.container{
width:100%;
max-width:450px;
background:#111;
border-radius:20px;
padding:20px;
box-shadow:0 0 25px #7c3aed;
}

.logo{
text-align:center;
font-size:30px;
font-weight:bold;
margin-bottom:20px;
color:#a855f7;
text-shadow:0 0 15px #a855f7;
}

input{
width:100%;
padding:15px;
border:none;
outline:none;
border-radius:12px;
background:#1a1a1a;
color:white;
margin-bottom:15px;
}

button{
width:100%;
padding:15px;
border:none;
border-radius:12px;
background:linear-gradient(45deg,#7c3aed,#2563eb);
color:white;
font-weight:bold;
font-size:16px;
cursor:pointer;
}

button:hover{
opacity:.9;
}

.loading{
display:none;
text-align:center;
margin-top:15px;
}

.result{
display:none;
margin-top:20px;
}

.result img{
width:100%;
border-radius:15px;
margin-bottom:15px;
}

.info{
background:#1a1a1a;
padding:12px;
border-radius:12px;
margin-bottom:10px;
}

.downloadBtn{
display:block;
text-decoration:none;
margin-top:10px;
}

.footer{
text-align:center;
margin-top:20px;
opacity:.7;
font-size:12px;
}
</style>
</head>
<body>

<div class="container">

<div class="logo">
🚀 TikDown Pro
</div>

<input
id="url"
placeholder="Paste Link TikTok..."
>

<button onclick="downloadVideo()">
DOWNLOAD
</button>

<div class="loading" id="loading">
⏳ Mengambil data...
</div>

<div class="result" id="result">

<img id="thumb">

<div class="info">
👤 <span id="author"></span>
</div>

<div class="info">
📝 <span id="title"></span>
</div>

<div class="info">
⏱️ <span id="duration"></span> Detik
</div>

<a id="videoLink" class="downloadBtn">
<button>
🎬 Download HD
</button>
</a>

<a id="audioLink" class="downloadBtn">
<button>
🎵 Download Audio
</button>
</a>

</div>

<div class="footer">
senzyy@lstc
</div>

</div>

<script>

async function downloadVideo(){

let url=document.getElementById("url").value;

if(!url){
alert("Masukkan link TikTok dulu!");
return;
}

document.getElementById("loading").style.display="block";
document.getElementById("result").style.display="none";

try{

const res=await fetch(
`https://api.azbry.com/api/download/tiktok?url=${encodeURIComponent(url)}`
);

const data=await res.json();

document.getElementById("thumb").src=
data.result.thumbnail;

document.getElementById("author").innerText=
data.result.author;

document.getElementById("title").innerText=
data.result.title;

document.getElementById("duration").innerText=
data.result.duration;

document.getElementById("videoLink").href=
data.result.links[0];

document.getElementById("audioLink").href=
data.result.music.url;

document.getElementById("result").style.display="block";

}catch(e){

alert("Gagal mengambil video!");

console.log(e);

}

document.getElementById("loading").style.display="none";

}

</script>

</body>
</html>
